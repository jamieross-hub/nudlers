openapi: 3.0.3
info:
  title: Nudlers Finance API
  description: |
    API for managing personal finance transactions, budgets, and bank/credit card scraping.
    
    ## Transaction Types
    Transactions can be of two types:
    - `credit_card` - Credit card transactions from vendors like visaCal, max, isracard, amex
    - `bank` - Bank account transactions from vendors like hapoalim, leumi, mizrahi, discount
    
    Use the `transactionType` query parameter to filter transactions by type.
  version: 1.0.0
  contact:
    name: Nudlers
  license:
    name: MIT

servers:
  - url: /api
    description: API Server

tags:
  - name: Finance
    description: Transactions and account management
  - name: Organization
    description: Categories, rules, and mappings
  - name: Planning
    description: Budgets and financial goals
  - name: Reports
    description: Financial analysis and recurring payments
  - name: Integrations
    description: Scraping, credentials, and external services (WhatsApp)
  - name: AI Chat
    description: Interactive financial assistant
  - name: Operations
    description: System maintenance, health checks, and migrations
  - name: Vault
    description: Security, encryption, and passkey management

paths:
  /vault/status:
    get:
      tags:
        - Vault
      summary: Get vault status
      description: Check if the vault is initialized, locked, or needs migration.
      responses:
        '200':
          description: Vault status
          content:
            application/json:
              schema:
                type: object
                properties:
                  initialized:
                    type: boolean
                  locked:
                    type: boolean
                  needsMigration:
                    type: boolean
                  hasPasskeys:
                    type: boolean
                  passkeysCount:
                    type: integer
        '500':
          $ref: '#/components/responses/InternalError'

  /vault/initialize:
    post:
      tags:
        - Vault
      summary: Initialize vault
      description: Set the initial passphrase for a new vault.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - passphrase
              properties:
                passphrase:
                  type: string
                  minLength: 8
      responses:
        '201':
          description: Vault initialized successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /vault/unlock:
    post:
      tags:
        - Vault
      summary: Unlock vault
      description: Unlock the vault using the passphrase.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - passphrase
              properties:
                passphrase:
                  type: string
      responses:
        '200':
          description: Vault unlocked successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        '401':
          description: Invalid passphrase
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '500':
          $ref: '#/components/responses/InternalError'

  /vault/lock:
    post:
      tags:
        - Vault
      summary: Lock vault
      description: Lock the vault and clear the master key from memory.
      responses:
        '200':
          description: Vault locked successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  locked:
                    type: boolean
        '500':
          $ref: '#/components/responses/InternalError'

  /vault/change-passphrase:
    post:
      tags:
        - Vault
      summary: Change passphrase
      description: Change the vault passphrase. Requires encryption of old key with new passphrase.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - currentPassphrase
                - newPassphrase
              properties:
                currentPassphrase:
                  type: string
                newPassphrase:
                  type: string
                  minLength: 8
      responses:
        '200':
          description: Passphrase changed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  passkeysCleared:
                    type: integer
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: Forbidden - Vault must be unlocked
        '500':
          $ref: '#/components/responses/InternalError'

  /vault/migrate:
    post:
      tags:
        - Vault
      summary: Migrate legacy key
      description: Migrate from legacy environment variable key to Memory-Locked Vault.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - passphrase
              properties:
                passphrase:
                  type: string
                  minLength: 8
      responses:
        '200':
          description: Migration successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /vault/passkey:
    get:
      tags:
        - Vault
      summary: List passkeys
      description: List all registered passkeys (without sensitive data).
      responses:
        '200':
          description: List of passkeys
          content:
            application/json:
              schema:
                type: object
                properties:
                  passkeys:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        credentialId:
                          type: string
                        createdAt:
                          type: string
                  total:
                    type: integer
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      tags:
        - Vault
      summary: Clear all passkeys
      description: Remove all registered passkeys. Requires unlocked vault.
      responses:
        '200':
          description: All passkeys cleared
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  cleared:
                    type: integer
        '403':
          description: Forbidden - Vault must be unlocked
        '500':
          $ref: '#/components/responses/InternalError'

  /vault/passkey/{id}:
    delete:
      tags:
        - Vault
      summary: Delete a passkey
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Passkey deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        '403':
          description: Forbidden - Vault must be unlocked
        '404':
          description: Passkey not found
        '500':
          $ref: '#/components/responses/InternalError'

  /vault/passkey/register-options:
    get:
      tags:
        - Vault
      summary: Get registration options
      description: Generate WebAuthn registration options.
      responses:
        '200':
          description: Registration options
          content:
            application/json:
              schema:
                type: object
        '500':
          $ref: '#/components/responses/InternalError'

  /vault/passkey/register-verify:
    post:
      tags:
        - Vault
      summary: Verify registration
      description: Verify WebAuthn registration response and store credential.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - registrationResponse
                - passphrase
              properties:
                registrationResponse:
                  type: object
                passphrase:
                  type: string
      responses:
        '201':
          description: Passkey registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: Forbidden - Vault must be unlocked
        '500':
          $ref: '#/components/responses/InternalError'

  /vault/passkey/login-options:
    get:
      tags:
        - Vault
      summary: Get login options
      description: Generate WebAuthn authentication options.
      responses:
        '200':
          description: Authentication options
          content:
            application/json:
              schema:
                type: object
        '404':
          description: No passkeys registered
        '500':
          $ref: '#/components/responses/InternalError'

  /vault/passkey/login-verify:
    post:
      tags:
        - Vault
      summary: Verify login
      description: Verify WebAuthn authentication response and unlock vault.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - authenticationResponse
              properties:
                authenticationResponse:
                  type: object
      responses:
        '200':
          description: Vault unlocked successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /transactions:
    get:
      tags:
        - Finance
      summary: List transactions
      description: |
        Retrieve transactions with optional filtering by type, date range, vendor, etc.
        Default returns all transactions (both bank and credit card).
        Ordered by date DESC (newest first).
      responses:
        '200':
          description: List of transactions or aggregate summary
          content:
            application/json:
              schema:
                oneOf:
                  - type: array
                    items:
                      $ref: '#/components/schemas/Transaction'
                    description: List of transactions
                  - type: object
                    required:
                      - categories
                      - nonMapped
                      - allTransactions
                      - lastMonth
                    properties:
                      categories:
                        type: integer
                      nonMapped:
                        type: integer
                      allTransactions:
                        type: integer
                      lastMonth:
                        type: string
                        description: Date of the most recent transaction (DD-MM-YYYY)
                    description: Aggregate stats (if summary=true)
                  - type: array
                    items:
                      type: string
                    description: List of available months (if availableMonths=true)
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'
      parameters:
        - name: transactionType
          in: query
          description: Filter by transaction type
          schema:
            type: string
            enum: [all, bank, credit_card]
            default: all
        - name: startDate
          in: query
          description: Start date filter (YYYY-MM-DD)
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          description: End date filter (YYYY-MM-DD)
          schema:
            type: string
            format: date
        - name: vendor
          in: query
          description: Filter by vendor
          schema:
            type: string
        - name: accountNumber
          in: query
          description: Filter by account number
          schema:
            type: string
        - name: category
          in: query
          description: Filter by category
          schema:
            type: string
        - name: sortBy
          in: query
          description: Field to sort by
          schema:
            type: string
            enum: [name, price, date, category, account_number, vendor]
            default: date
        - name: sortOrder
          in: query
          description: Sort direction
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - name: limit
          in: query
          description: Maximum number of results
          schema:
            type: integer
            default: 100
        - name: offset
          in: query
          description: Pagination offset
          schema:
            type: integer
            default: 0
        - name: q
          in: query
          description: Search term (name, vendor, category, identifier)
          schema:
            type: string
        - name: billingCycle
          in: query
          description: Filter by billing cycle (YYYY-MM)
          schema:
            type: string
        - name: description
          in: query
          description: Filter by description (exact match on name)
          schema:
            type: string
        - name: last4digits
          in: query
          description: Filter by last 4 digits (or suffix) of account number
          schema:
            type: string
        - name: bankAccountId
          in: query
          description: Filter by credential ID or linked bank account ID
          schema:
            type: integer
        - name: uncategorizedOnly
          in: query
          description: Filter for uncategorized transactions only
          schema:
            type: boolean
        - name: summary
          in: query
          description: When true, returns aggregate statistics instead of a list of transactions.
          schema:
            type: boolean
            default: false
        - name: availableMonths
          in: query
          description: When true, returns a list of years and months that have transactions.
          schema:
            type: boolean
            default: false
        - name: favoritesOnly
          in: query
          description: Filter for favorited transactions only
          schema:
            type: boolean
            default: false
    post:
      tags:
        - Finance
      summary: Add a manual transaction
      description: |
        Add a manual expense or income transaction. Useful for cash purchases,
        transfers, or any transaction not captured by bank scrapers.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - price
                - date
              properties:
                name:
                  type: string
                  description: Transaction description (e.g., "Coffee at local cafe")
                price:
                  type: number
                  description: Transaction amount (positive for expenses, negative for income)
                date:
                  type: string
                  format: date
                  description: Transaction date (YYYY-MM-DD)
                category:
                  type: string
                  description: Category name (e.g., "Dining", "Groceries")
                vendor:
                  type: string
                  default: manual
                  description: Source vendor (defaults to "manual")
                accountNumber:
                  type: string
                  description: Account identifier (defaults to "manual")
                memo:
                  type: string
                  description: Additional notes
                type:
                  type: string
                  default: normal
                  description: Transaction type
      responses:
        '201':
          description: Transaction created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  transaction:
                    $ref: '#/components/schemas/Transaction'
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /transactions/{id}:
    get:
      tags:
        - Finance
      summary: Get a single transaction
      parameters:
        - name: id
          in: path
          required: true
          description: Transaction ID in format `identifier|vendor`
          schema:
            type: string
      responses:
        '200':
          description: Transaction details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transaction'
        '404':
          description: Transaction not found
        '500':
          $ref: '#/components/responses/InternalError'
    put:
      tags:
        - Finance
      summary: Update a transaction
      parameters:
        - name: id
          in: path
          required: true
          description: Transaction ID in format `identifier|vendor`
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                price:
                  type: number
                  description: Updated price
                category:
                  type: string
                  description: Updated category
                is_favorite:
                  type: boolean
                  description: Favorited status
                notes:
                  type: string
                  description: User notes
      responses:
        '200':
          description: Transaction updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      tags:
        - Finance
      summary: Delete a transaction
      parameters:
        - name: id
          in: path
          required: true
          description: Transaction ID in format `identifier|vendor`
          schema:
            type: string
      responses:
        '200':
          description: Transaction deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        '500':
          $ref: '#/components/responses/InternalError'



  /accounts:
    get:
      tags:
        - Finance
      summary: List all accounts
      description: Returns a list of all bank and credit card accounts with their latest balances.
      responses:
        '200':
          description: A list of accounts
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    vendor:
                      type: string
                    account_number:
                      type: string
                    balance:
                      type: number
                      nullable: true
                    balance_updated_at:
                      type: string
                      format: date-time
                      nullable: true
                    nickname:
                      type: string
                    is_hidden:
                      type: boolean
                      default: false
                    credential:
                      type: object
                      properties:
                        id:
                          type: integer
                        vendor:
                          type: string
                        nickname:
                          type: string
      parameters:
        - name: showHidden
          in: query
          description: Whether to include hidden accounts in the list.
          schema:
            type: boolean
            default: false

  /accounts/{id}:
    patch:
      tags:
        - Finance
      summary: Update account settings (e.g. visibility)
      parameters:
        - name: id
          in: path
          required: true
          description: Account (card_ownership) ID
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                is_hidden:
                  type: boolean
                  description: Whether to hide this account from summaries.
      responses:
        '200':
          description: Account updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  is_hidden:
                    type: boolean
        '404':
          description: Account not found
        '500':
          $ref: '#/components/responses/InternalError'

  /finance/recurring:
    get:
      tags:
        - Finance
      summary: List manual recurring payments
      responses:
        '200':
          description: List of manual recurring payments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ManualRecurringPayment'
    post:
      tags:
        - Finance
      summary: Create a manual recurring payment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - amount
                - day_of_month
              properties:
                name:
                  type: string
                amount:
                  type: number
                category:
                  type: string
                account_number:
                  type: string
                day_of_month:
                  type: integer
                frequency:
                  type: string
                  enum: [monthly, bi-monthly]
                  default: monthly
      responses:
        '201':
          description: Created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManualRecurringPayment'
    patch:
      tags:
        - Finance
      summary: Update a manual recurring payment status
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - id
                - is_active
              properties:
                id:
                  type: integer
                is_active:
                  type: boolean
      responses:
        '200':
          description: Updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManualRecurringPayment'
    delete:
      tags:
        - Finance
      summary: Delete a manual recurring payment
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

  /reports/projection:
    get:
      tags:
        - Reports
      summary: Get financial balance projection
      description: |
        Provides a daily projection of the total balance for the next 30 days.
        Accounts for:
        - Current bank account balances
        - Recurring bank transactions (detected from history)
        - Future credit card settlements (based on processed_date)
        - Manual recurring payments (user-defined)
      responses:
        '200':
          description: Projection data for the next 30 days
          content:
            application/json:
              schema:
                type: object
                properties:
                  summary:
                    type: object
                    properties:
                      startingBalance:
                        type: number
                      endingBalance:
                        type: number
                      periodDays:
                        type: integer
                  projection:
                    type: array
                    items:
                      type: object
                      properties:
                        date:
                          type: string
                          format: date
                        balances:
                          type: object
                          additionalProperties:
                            type: number
                          description: Map of account number to balance for that day
                        totalBalance:
                          type: number
                        dailyChange:
                          type: number
                        bankRecurring:
                          type: array
                          items:
                            type: object
                            properties:
                              name:
                                type: string
                              amount:
                                type: number
                              category:
                                type: string
                              account_number:
                                type: string
                              is_manual:
                                type: boolean
                        ccPayments:
                          type: array
                          items:
                            type: object
                            properties:
                              name:
                                type: string
                              displayName:
                                type: string
                              amount:
                                type: number
                              vendor:
                                type: string
                              account_number:
                                type: string
                              count:
                                type: integer
                  accounts:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        account_number:
                          type: string
                        balance:
                          type: number
                        nickname:
                          type: string
                        credential_id:
                          type: integer
                  accountMetadata:
                    type: object
                    additionalProperties:
                      type: object
                      properties:
                        nickname:
                          type: string
                        account_number:
                          type: string
                        credential_id:
                          type: integer
        '500':
          $ref: '#/components/responses/InternalError'

  /reports/monthly-summary:
    get:
      tags:
        - Reports
      summary: Get monthly summary
      parameters:
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
        - name: billingCycle
          in: query
          description: Billing cycle (YYYY-MM)
          schema:
            type: string
        - name: vendor
          in: query
          schema:
            type: string
        - name: groupBy
          in: query
          description: Group results by
          schema:
            type: string
            enum: [description, last4digits, category]
        - name: excludeBankTransactions
          in: query
          description: When true, filters out transactions originating from known bank vendors (e.g. hapoalim, leumi). Useful for isolating card-only expenses.
          schema:
            type: boolean
            default: false
        - name: sortBy
          in: query
          description: Field to sort by
          schema:
            type: string
            enum: [name, count, card_expenses, total]
            default: card_expenses
        - name: sortOrder
          in: query
          description: Sort direction
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - name: limit
          in: query
          description: Maximum number of results
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          description: Pagination offset
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Monthly summary data
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                    description: Total number of items matching the filter
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        bank_income:
                          type: number
                        bank_expenses:
                          type: number
                        card_expenses:
                          type: number
                        net_balance:
                          type: number

  /reports/budget-vs-actual:
    get:
      tags:
        - Reports
      summary: Compare budget vs actual spending
      parameters:
        - name: cycle
          in: query
          description: Billing cycle (YYYY-MM)
          schema:
            type: string
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Budget vs actual comparison
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    category:
                      type: string
                    budget_limit:
                      type: number
                    actual_spent:
                      type: number
                    remaining:
                      type: number


  /reports/recurring-payments:
    get:
      tags:
        - Reports
      summary: Get recurring payments (installments and smart subscriptions)
      description: |
        Returns paginated lists of installment transactions and detected recurring payments.

        **Sorting defaults:**
        - Installments: active first (status), then by amount descending
        - Recurring: by monthly amount descending
      parameters:
        - name: type
          in: query
          description: Filter by payment type
          schema:
            type: string
            enum: [all, installments, recurring]
            default: all
        - name: status
          in: query
          description: Filter installments by status (only applies when type is 'installments' or 'all')
          schema:
            type: string
            enum: [all, active, completed]
            default: all
        - name: frequency
          in: query
          description: Filter recurring payments by frequency (only applies when type is 'recurring' or 'all')
          schema:
            type: string
            enum: [all, monthly, bi-monthly]
            default: all
        - name: limit
          in: query
          description: Maximum number of results per type (max 500)
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 500
        - name: offset
          in: query
          description: Pagination offset
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: sortBy
          in: query
          description: |
            Field to sort by. Available options depend on type:
            - Installments: status, amount, next_payment_date, name
            - Recurring: amount, frequency, month_count, last_charge_date, next_payment_date, name
          schema:
            type: string
            enum: [status, amount, next_payment_date, name, frequency, month_count, last_charge_date]
        - name: sortOrder
          in: query
          description: Sort direction
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        '200':
          description: List of recurring payments and active installments with pagination info
          content:
            application/json:
              schema:
                type: object
                properties:
                  installments:
                    type: array
                    items:
                      $ref: '#/components/schemas/InstallmentDetail'
                  recurring:
                    type: array
                    items:
                      $ref: '#/components/schemas/RecurringPaymentDetail'
                  pagination:
                    type: object
                    properties:
                      limit:
                        type: integer
                        description: Maximum number of results per type
                      offset:
                        type: integer
                        description: Pagination offset
                      totalInstallments:
                        type: integer
                        description: Total count of installments matching filters
                      totalRecurring:
                        type: integer
                        description: Total count of recurring payments matching filters
                      total:
                        type: integer
                        description: Combined total count
        '500':
          $ref: '#/components/responses/InternalError'

  /reports/non-recurring-exclusions:
    get:
      tags:
        - Reports
      summary: List non-recurring exclusions
      description: Returns a list of all transactions marked as non-recurring.
      responses:
        '200':
          description: List of exclusions
          content:
            application/json:
              schema:
                type: object
