  /scrapers/run-stream:
    post:
      tags:
        - Integrations
      summary: Run scraper (streaming)
      description: |
        Run scraper with Server-Sent Events for progress updates.
        Returns SSE stream with events: progress, complete, error.
        For Bank Hapoalim, the stream may emit an `otpRequired` progress event
        when 2FA verification is needed. Use the /scrapers/otp endpoint to submit the code.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScrapeRequest'
      responses:
        '200':
          description: SSE stream of scrape progress
          content:
            text/event-stream:
              schema:
                type: string

  /scrapers/otp:
    get:
      tags:
        - Integrations
      summary: Check OTP status
      description: |
        Check if there is a pending 2FA/OTP verification request from a running scraper.
        Used by the frontend to poll for OTP status.
      responses:
        '200':
          description: OTP status
          content:
            application/json:
              schema:
                type: object
                properties:
                  pending:
                    type: boolean
                    description: Whether there is a pending OTP request
                  companyId:
                    type: string
                    nullable: true
                    description: The vendor ID waiting for OTP (e.g. "hapoalim")
    post:
      tags:
        - Integrations
      summary: Submit OTP code
      description: |
        Submit a 2FA/OTP verification code received via SMS during a Bank Hapoalim scrape.
        The scraper will use this code to complete authentication and continue scraping.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - otpCode
              properties:
                otpCode:
                  type: string
                  description: The verification code received via SMS
                  example: "123456"
      responses:
        '200':
          description: OTP code submitted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        '400':
          description: Invalid or missing OTP code
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        '409':
          description: No pending OTP request
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        '405':
          description: Method not allowed

  /scrapers/sync-all-stream:
    post:
      tags:
        - Integrations
      summary: Sync all credentials (streaming)
      description: |
        Trigger scrape for all active credentials with Server-Sent Events progress updates.
        Returns SSE stream with events: queue, account_start, progress, account_complete, account_error, complete, error
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SyncAllRequest'
      responses:
        '200':
          description: SSE stream of sync progress
          content:
            text/event-stream:
              schema:
                type: string

  /scrapers/status:
    get:
      tags:
        - Integrations
      summary: Get current scraping status
      description: Get overall sync health, settings, latest scrape, and optional history/account details.
      parameters:
        - name: minimal
          in: query
          description: If true, returns a summary without history or full account list
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Sync status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncStatusResponse'



  /scrape-events:
    get:
      tags:
        - Integrations
      summary: List scrape and system events
      description: Retrieve history of scraping events and system audit logs (like WhatsApp summaries).
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
      responses:
        '200':
          description: List of events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ScrapeEvent'

  /scrape-events/{id}/report:
    get:
      tags:
        - Integrations
      summary: Get detailed scrape report
      parameters:
        - name: id
          in: path
          required: true
          description: Scrape event ID
          schema:
            type: string
      responses:
        '200':
          description: Detailed scrape report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScrapeReport'
        '404':
          description: Scrape report not found

  /scrapers/last-transaction-date:
    get:
      tags:
        - Integrations
      summary: Get last transaction date for a vendor
      parameters:
        - name: vendor
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Most recent transaction date
          content:
            application/json:
              schema:
                type: object
                properties:
                  lastDate:
                    type: string
                    format: date-time



  /chat/stream:
    post:
      tags:
        - AI Chat
      summary: Chat with financial AI assistant (streaming)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AIChatRequest'
      responses:
        '200':
          description: SSE stream of AI response
          content:
            text/event-stream:
              schema:
                type: string

  /chat/history:
    get:
      tags:
        - AI Chat
      summary: Get chat history (sessions)
      responses:
        '200':
          description: List of chat sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ChatSession'
    delete:
      tags:
        - AI Chat
      summary: Delete a chat session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - id
              properties:
                id:
                  type: integer
      responses:
        '200':
          description: Session deleted

  /chat/messages:
    get:
      tags:
        - AI Chat
      summary: Get messages for a chat session
      parameters:
        - name: sessionId
          in: query
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ChatMessage'

  /scrapers/stop:
    post:
      tags:
        - Integrations
      summary: Stop all running scrapers
      responses:
        '200':
          description: Scrapers stopped
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string

  /settings:
    get:
      tags:
        - Operations
      summary: Get all settings
      responses:
        '200':
          description: Application settings
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
    put:
      tags:
        - Operations
      summary: Update settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Settings updated


  /whatsapp/status:
    get:
      tags:
        - Integrations
      summary: Get WhatsApp connection status
      responses:
        '200':
          description: WhatsApp status and QR code
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [DISCONNECTED, INITIALIZING, QR_READY, AUTHENTICATED, READY]
                  qr:
                    type: string
                    nullable: true
                    description: QR code string to be rendered
                  timestamp:
                    type: string
                    format: date-time
    post:
      tags:
        - Integrations
      summary: Control WhatsApp client
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - action
              properties:
                action:
                  type: string
                  enum: [connect, restart, disconnect]
                  description: 'connect: Start client and generate QR code; restart: Restart client; disconnect: disconnect session'
      responses:
        '200':
          description: Action performed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  /whatsapp-test:
    post:
      tags:
        - Integrations
      summary: Run WhatsApp integration test
      description: Generates a daily summary and attempts to send it via WhatsApp.
      responses:
        '200':
          description: Test completed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  results:
                    type: array
                    items:
                      type: object
        '400':
          description: Invalid configuration
        '500':
          description: Test failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  error:
                    type: string
                  message:
                    type: string
                    nullable: true



  /ping:
    get:
      tags:
        - Operations
      summary: Health check
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /check-version:
    get:
      tags:
        - Operations
      summary: Check for new application versions
      description: Compares the current version with the latest release on GitHub.
      responses:
        '200':
          description: Version information
          content:
            application/json:
              schema:
                type: object
                properties:
                  hasNewVersion:
                    type: boolean
                  latestVersion:
                    type: string
                  currentVersion:
                    type: string
                  releaseUrl:
                    type: string
        '500':
          $ref: '#/components/responses/InternalError'

  /migrate:
    get:
      tags:
        - Operations
      summary: Run database migrations
      responses:
        '200':
          description: Migration status
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags:
        - Operations
      summary: Run database migrations
      responses:
        '200':
          description: Migration completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  migrations:
                    type: array
                    items:
                      type: object
        '500':
          $ref: '#/components/responses/InternalError'






  /cards/ownerships:
    get:
      tags:
        - Integrations
      summary: Get card ownership mappings
      responses:
        '200':
          description: List of card ownerships
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CardOwnership'

  /cards/ownerships/{id}:
    patch:
      tags:
        - Integrations
      summary: Update card ownership
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                linked_bank_account_id:
                  type: integer
                custom_bank_account_number:
                  type: string
                custom_bank_account_nickname:
                  type: string
      responses:
        '200':
          description: Updated successfully

  /cards:
    get:
      tags:
        - Integrations
      summary: Get credit card vendors and details (excludes bank accounts)
      responses:
        '200':
          description: List of cards
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CardVendor'
    post:
      tags:
        - Integrations
      summary: Create or update card vendor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CardVendor'
      responses:
        '200':
          description: Created/Updated
    delete:
      tags:
        - Integrations
      summary: Delete card vendor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - last4_digits
              properties:
                last4_digits:
                  type: string
      responses:
        '200':
          description: Deleted

  /credentials/truncate/{id}:
    delete:
      tags:
        - Integrations
      summary: Truncate credential transactions
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Data truncated

  /maintenance/database/export:
    get:
      tags:
        - Operations
      summary: Export database
      responses:
        '200':
          description: Database backup JSON
          content:
            application/json:
              schema:
                type: object

  /maintenance/database/import:
    post:
      tags:
        - Operations
      summary: Import database
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                mode:
                  type: string
                  enum: [replace, merge]
      responses:
        '200':
          description: Import result
  /mcp:
    get:
      tags:
        - Operations
      summary: Establish MCP SSE connection
      description: |
        Endpoint for Server-Sent Events (SSE) connection in Model Context Protocol (MCP).
        This keeps a long-running connection open to relay messages to the MCP server.
      responses:
        '200':
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string
                format: binary
    post:
      tags:
        - Operations
      summary: Send message to MCP server
      description: |
        Relays a JSON-RPC message to an active MCP session identified by the sessionId.
      parameters:
        - name: sessionId
          in: query
          required: true
          description: Unique session ID established via the GET /mcp request.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '202':
          description: Accepted
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          description: Session not found

components:
  schemas:
    Transaction:
      type: object
      properties:
        identifier:
          type: string
          description: Unique transaction identifier
        vendor:
          type: string
          description: Source vendor (bank or credit card company)
        date:
          type: string
          format: date
          description: Transaction date
        name:
          type: string
          description: Transaction description
        price:
          type: number
          description: Transaction amount
        category:
          type: string
          description: Transaction category
        type:
          type: string
          description: Transaction type (credit/debit)
        processed_date:
          type: string
          format: date
          description: Processing date (for billing cycle)
        original_amount:
          type: number
          description: Original amount (for foreign transactions)
        original_currency:
          type: string
          description: Original currency code
        charged_currency:
          type: string
          description: Charged currency code
        memo:
          type: string
          description: Additional notes
        status:
          type: string
          description: Transaction status
        installments_number:
          type: integer
          description: Current installment number
        installments_total:
          type: integer
          description: Total number of installments
        account_number:
          type: string
          description: Card/account last 4 digits
        category_source:
          type: string
          description: How the category was assigned (scraper/rule/cache)
        rule_matched:
          type: string
          description: Pattern that matched for rule-based categorization
        transaction_type:
          type: string
          enum: [bank, credit_card]
          description: Whether this is a bank or credit card transaction
        is_favorite:
          type: boolean
          description: Favorited status
        notes:
          type: string
          description: User notes

    Budget:
      type: object
      properties:
        id:
          type: integer
        category:
          type: string
          description: Category name
        budget_limit:
          type: number
          description: Monthly budget limit
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CategorizationRule:
      type: object
      properties:
        id:
          type: integer
        name_pattern:
          type: string
          description: Pattern to match in transaction names
        target_category:
          type: string
          description: Category to assign when matched
        is_active:
          type: boolean

    Credential:
      type: object
      properties:
        id:
          type: integer
        vendor:
          type: string
          description: Bank or credit card vendor
        nickname:
          type: string
          description: Friendly name for this credential
        is_active:
          type: boolean
        last_synced_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time

    CredentialInput:
      type: object
      required:
        - vendor
      properties:
        vendor:
          type: string
          description: Bank or credit card vendor ID
        username:
          type: string
        password:
          type: string
        id_number:
          type: string
          description: ID number (for Israeli banks)
        card6_digits:
          type: string
          description: First 6 digits of card (for Isracard/Amex)
        nickname:
          type: string
        is_active:
          type: boolean
          default: true

    ScrapeRequest:
      type: object
      required:
        - options
        - credentials
        - credentialId
      properties:
        options:
          type: object
          required:
            - companyId
            - startDate
          properties:
            companyId:
              type: string
              description: Vendor ID (e.g., visaCal, hapoalim)
            startDate:
              type: string
              format: date
              description: Start date for scraping
            showBrowser:
              type: boolean
              description: Show browser window (for debugging/2FA)
        credentials:
          type: object
          description: Vendor-specific credentials
        credentialId:
          type: integer
          description: Database credential ID

    ScrapeEvent:
      type: object
      properties:
        id:
          type: integer
        triggered_by:
          type: string
        vendor:
          type: string
        status:
          type: string
          enum: [started, completed, success, failed, error, cancelled]
        message:
          type: string
        created_at:
          type: string
          format: date-time
        duration_seconds:
          type: number
        report_json:
          $ref: '#/components/schemas/ScrapeReport'

    ScrapeReport:
      type: object
      properties:
        processedTransactions:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
                format: date
              description:
                type: string
              amount:
                type: number
              currency:
                type: string
              category:
                type: string
              source:
                type: string
              rule:
                type: string
              cardLast4:
                type: string
              isUpdate:
                type: boolean
              isDuplicate:
                type: boolean
              isBank:
                type: boolean
              oldCategory:
                type: string
              installmentsNumber:
                type: integer
              installmentsTotal:
                type: integer
              totalAmount:
                type: number
        savedTransactions:
          type: integer
        duration_seconds:
          type: number
        body:
          type: string
          description: Full message body for notification events
        to:
          type: string
          description: Recipient for notification events
        error:
          type: string
          description: Error details if event failed

    SyncAllRequest:
      type: object
      properties:
        daysBack:
          type: integer
          default: 30

    SyncStatusResponse:
      type: object
      properties:
        syncHealth:
          type: string
          enum: [healthy, stale, outdated, error, syncing, no_accounts, never_synced, unknown]
        settings:
          type: object
          properties:
            enabled:
              type: boolean
            syncHour:
              type: integer
            daysBack:
              type: integer
        activeAccounts:
          type: integer
        latestScrape:
          $ref: '#/components/schemas/ScrapeEvent'
        summary:
          type: object
          properties:
            oldest_sync_at:
              type: string
              format: date-time
              nullable: true
            has_never_synced:
              type: boolean
        history:
          type: array
          items:
            $ref: '#/components/schemas/ScrapeEvent'
        accountSyncStatus:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              nickname:
                type: string
              vendor:
                type: string
              last_synced_at:
                type: string
                format: date-time
                nullable: true

    InstallmentDetail:
      type: object
      properties:
        name:
          type: string
        price:
          type: number
        original_amount:
          type: number
        original_currency:
          type: string
        category:
          type: string
        vendor:
          type: string
        account_number:
          type: string
        current_installment:
          type: integer
        total_installments:
          type: integer
        last_charge_date:
          type: string
          format: date
        next_payment_date:
          type: string
          format: date
        status:
          type: string
          enum: [active, completed]

    RecurringPaymentDetail:
      type: object
      properties:
        name:
          type: string
        monthly_amount:
          type: number
        price:
          type: number
        category:
          type: string
        vendor:
          type: string
        account_number:
          type: string
        month_count:
          type: integer
        last_charge_date:
          type: string
          format: date
        frequency:
          type: string
          enum: [monthly, bi-monthly]
        months:
          type: array
          items:
            type: string
        next_payment_date:
          type: string
          format: date

    AIChatRequest:
      type: object
      required:
        - message
      properties:
        message:
          type: string
        context:
          type: object
        sessionId:
          type: string

    AIChatResponse:
      type: object
      properties:
        response:
          type: string
        success:
          type: boolean
        model:
          type: string

    CardOwnership:
      type: object
      properties:
        id:
          type: integer
        vendor:
          type: string
        account_number:
          type: string
        linked_bank_account_id:
          type: integer
        custom_bank_account_number:
          type: string
        custom_bank_account_nickname:
          type: string

    CardVendor:
      type: object
      properties:
        last4_digits:
          type: string
        card_vendor:
          type: string
        card_nickname:
          type: string
        transaction_count:
          type: integer

    ChatSession:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        created_at:
          type: string
          format: date-time
        last_message_at:
          type: string
          format: date-time

    ChatMessage:
      type: object
      properties:
        id:
          type: integer
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
        timestamp:
          type: string
          format: date-time

    ManualRecurringPayment:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        amount:
          type: number
        category:
          type: string
        account_number:
          type: string
        day_of_month:
          type: integer
        frequency:
          type: string
          enum: [monthly, bi-monthly]
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    WhatsAppStatus:
      type: object
      properties:
        status:
          type: string
          enum: [DISCONNECTED, INITIALIZING, QR_READY, AUTHENTICATED, READY]
        qr:
          type: string
          nullable: true
          description: QR code string if status is QR_READY

    WhatsAppActionRequest:
      type: object
      required:
        - action
      properties:
        action:
          type: string
          enum: [restart, disconnect]

    NonRecurringExclusion:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        account_number:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
              details:
                type: string
